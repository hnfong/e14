  /* --- CSS VARIABLES & RESET --- */
  :root {
   --bg-color: #f3f4f6;
   --card-bg: #ffffff;
   --text-main: #1f2937;
   --text-muted: #6b7280;
   --accent-color: #4f46e5; /* Indigo */
   --accent-hover: #4338ca;
   --border-color: #e5e7eb;
   --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  }

  * {
   box-sizing: border-box;
   margin: 0;
   padding: 0;
  }

  body {
   font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
   background-color: var(--bg-color);
   color: var(--text-main);
   display: flex;
   justify-content: center;
   align-items: center;
   min-height: 100vh;
   padding: 20px;
   line-height: 1.5;
  }

  /* --- LAYOUT CONTAINER --- */
  .container {
   width: 100%;
   max-width: 480px; /* Limits width on desktop */
   background: var(--card-bg);
   padding: 40px 30px;
   border-radius: 24px;
   box-shadow: var(--shadow);
   text-align: center;
   animation: fadeIn 0.8s ease-out;
  }

  /* --- PROFILE SECTION --- */
  .profile-img {
   width: 100px;
   height: 100px;
   background-color: #e5e7eb; /* Placeholder grey */
   border-radius: 50%;
   margin: 0 auto 20px auto;
   background-image: url('TODO');
   background-size: cover;
   background-position: center;
   border: 3px solid var(--card-bg);
   box-shadow: 0 0 0 2px var(--bg-color);
  }

  h1 {
   font-size: 1.5rem;
   font-weight: 600;
   margin-bottom: 8px;
   color: var(--text-main);
  }

  .bio {
   color: var(--text-muted);
   font-size: 0.95rem;
   margin-bottom: 30px;
   max-width: 90%;
   margin-left: auto;
   margin-right: auto;
  }

  /* --- LINKS SECTION --- */
  .links-container {
   display: flex;
   flex-direction: column;
   gap: 16px;
  }

  .link-item {
   display: flex;
   align-items: center;
   justify-content: space-between; /* Icon left, label left, arrow right */
   text-decoration: none;
   padding: 16px 20px;
   background-color: var(--bg-color);
   border: 1px solid transparent;
   border-radius: 12px;
   color: var(--text-main);
   font-weight: 500;
   transition: all 0.2s ease;
   position: relative;
  }

  /* Hover Effects */
  .link-item:hover {
   transform: translateY(-2px);
   background-color: #f9fafb;
   border-color: var(--border-color);
   box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
   color: var(--accent-color);
  }

  /* Icon styling */
  .link-item svg {
   width: 24px;
   height: 24px;
   margin-right: 16px;
   flex-shrink: 0;
   fill: var(--text-main);
   transition: fill 0.2s ease;
  }

  .link-item:hover svg {
   fill: var(--accent-color);
  }

  .link-content {
   display: flex;
   align-items: center;
   flex-grow: 1;
  }

  /* Special style for the "Note" link to make it stand out */
  .link-item.note-link {
   background-color: var(--accent-color);
   color: white;
   border: none;
  }
  
  .link-item.note-link svg {
   fill: white;
  }

  .link-item.note-link:hover {
   background-color: var(--accent-hover);
   color: white;
   box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
  }

  /* --- FOOTER --- */
  footer {
   margin-top: 40px;
   font-size: 0.75rem;
   color: #9ca3af;
  }

  /* --- ANIMATION --- */
  @keyframes fadeIn {
   from { opacity: 0; transform: translateY(10px); }
   to { opacity: 1; transform: translateY(0); }
  }

  /* --- MOBILE TWEAKS --- */
  @media (max-width: 400px) {
   .container {
    padding: 30px 20px;
   }
   h1 { font-size: 1.3rem; }
  }
