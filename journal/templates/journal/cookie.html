<!DOCTYPE html>
<html lang="en">
<head>
    <!-- All generated by 🤖 Qwen3.5 27B -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal Access</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --error: #ef4444;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: var(--radius);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        .error-message {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Journal Access</h1>
        <p>Please enter your secret key to continue.</p>

        <div class="input-group">
            <label for="secretInput">Secret Key</label>
            <input type="text" id="secretInput" placeholder="Enter key..." autocomplete="off">
            <div id="errorText" class="error-message">Invalid key. Please try again.</div>
        </div>

        <button id="submitBtn">Unlock Journal</button>
    </div>

    <script>
        const COOKIE_NAME = 'journal_secret';
        const SECRET_VALUE = 'myvalue'; // Replace with your actual required value if needed, or logic below
        
        // If the value is dynamic, you might need to pass it here or fetch it.
        // For this minimalist demo, we assume the backend expects a specific string.
        // If you want to check against ANY non-empty value, change logic below.
        
        const submitBtn = document.getElementById('submitBtn');
        const secretInput = document.getElementById('secretInput');
        const errorText = document.getElementById('errorText');

        function showError() {
            errorText.style.display = 'block';
            secretInput.style.borderColor = '#ef4444';
            secretInput.focus();
        }

        function clearError() {
            errorText.style.display = 'none';
            secretInput.style.borderColor = '#e5e7eb';
        }

        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "") + expires + "; path=/";
        }

        function handleSubmit() {
            const value = secretInput.value.trim();

            if (!value) {
                showError();
                return;
            }

            clearError();
            submitBtn.classList.add('loading');
            submitBtn.textContent = 'Verifying...';

            // Simulate a tiny delay for UX, then set cookie and reload
            setTimeout(() => {
                // Logic: If you have a specific expected value, check it here.
                // If the backend just checks for existence, we set it with the user input.
                // Assuming we want to set the cookie to the user's input for the backend to validate:
                setCookie(COOKIE_NAME, value, 3650);

                // Reload the page to trigger the backend decorator check
                window.location.reload();
            }, 400);
        }

        submitBtn.addEventListener('click', handleSubmit);

        secretInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSubmit();
            }
        });
    </script>
</body>
</html>
